<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portero Virtual QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 mt-4 border border-slate-700">
        <div class="text-center pb-6 border-b border-slate-700">
            <div class="inline-block p-3 bg-blue-600/20 rounded-full text-blue-400 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <h1 id="nombre-edificio" class="text-2xl font-bold text-white tracking-wide">Cargando edificio...</h1>
            <p id="direccion-edificio" class="text-sm text-slate-400 mt-1">Por favor espera</p>
        </div>

        <div class="mt-6">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 text-center">Selecciona el Departamento</h2>
            <div id="grilla-departamentos" class="grid grid-cols-3 gap-3 max-h-[50vh] overflow-y-auto pr-1">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
<!-- ================================================================= -->
<!-- MODAL ESCUDO DE IDENTIFICACIÓN (Paso 1 - v1.04) -->
<!-- ================================================================= -->
<div id="modal-identificacion" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 transition-opacity">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full shadow-2xl text-white">
    
    <!-- Encabezado del Modal -->
    <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
      <div>
        <h3 class="text-lg font-bold text-blue-400" id="modal-titulo">Llamando al departamento...</h3>
        <p class="text-xs text-slate-400">Por seguridad, indícale al vecino quién eres</p>
      </div>
      <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-2xl font-bold px-2">&times;</button>
    </div>

    <!-- Sección 1: Botones Rápidos (Motivo) -->
    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">1. ¿Quién eres? (Elige una opción):</label>
    <div class="grid grid-cols-2 gap-2 mb-4">
      <button type="button" onclick="seleccionarMotivo('📦 Delivery / Correo', this)" class="motivo-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-2.5 text-xs font-medium text-left flex items-center gap-2 transition-all">
        <span class="text-base">📦</span> Delivery / Correo
      </button>
      <button type="button" onclick="seleccionarMotivo('👨‍👩‍👧 Familia / Amigo', this)" class="motivo-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-2.5 text-xs font-medium text-left flex items-center gap-2 transition-all">
        <span class="text-base">👨‍👩‍👧</span> Familia / Amigo
      </button>
      <button type="button" onclick="seleccionarMotivo('🔧 Servicio Técnico', this)" class="motivo-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-2.5 text-xs font-medium text-left flex items-center gap-2 transition-all">
        <span class="text-base">🔧</span> Servicio Técnico
      </button>
      <button type="button" onclick="seleccionarMotivo('💬 Visita general', this)" class="motivo-btn bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-2.5 text-xs font-medium text-left flex items-center gap-2 transition-all">
        <span class="text-base">💬</span> Otra visita
      </button>
    </div>

    <!-- Sección 2: Mensaje Escrito -->
    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">2. O escribe un mensaje (Opcional):</label>
    <input type="text" id="input-mensaje" placeholder="Ej: Soy mamá, ábrime / Dejé paquete" 
           class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4">

    <!-- Sección 3: Evidencia Visual/Voz (Preparado para el Paso 2) -->
    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">3. Adjuntar evidencia (Próximamente):</label>
    <div class="flex gap-2 mb-6">
      <button type="button" onclick="alert('En el Paso 2 activaremos la cámara web 📷')" class="flex-1 bg-slate-800/40 border border-dashed border-slate-600 rounded-lg p-2.5 text-xs text-slate-400 flex items-center justify-center gap-2 hover:bg-slate-800 transition cursor-not-allowed">
        <span>📷</span> Tomar Foto
      </button>
      <button type="button" onclick="alert('En el Paso 2 activaremos el micrófono 🎤')" class="flex-1 bg-slate-800/40 border border-dashed border-slate-600 rounded-lg p-2.5 text-xs text-slate-400 flex items-center justify-center gap-2 hover:bg-slate-800 transition cursor-not-allowed">
        <span>🎤</span> Nota de Voz
      </button>
    </div>

    <!-- Botón de Acción Principal (El verdadero timbre) -->
    <button id="btn-enviar-timbre" onclick="confirmarTimbre()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-600/30 transition duration-200 flex items-center justify-center gap-2 text-sm uppercase tracking-wide">
      <span>🔔</span> TOCAR TIMBRE AHORA
    </button>
    
  </div>
</div>
</body>
</html>
